name: Build and Deploy Notification Service

on:
  push:
    branches:
      - main
    paths:
      - 'services/notification-service/**'
      - '.github/workflows/notification-service.yml'

permissions:
  id-token: write
  contents: read

env:
  CONTAINER_APP_NAME: notification-service
  IMAGE_NAME: notification-service

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy notification-service to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ./services/notification-service
          dockerfilePath: Dockerfile
          acrName: imesh2
          imageToBuild: imesh2.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          containerAppName: ${{ env.CONTAINER_APP_NAME }}
          resourceGroup: ${{ vars.AZURE_RESOURCE_GROUP }}
